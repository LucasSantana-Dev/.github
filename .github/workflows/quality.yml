# Org-wide reusable quality + security workflow.
#
# Callers pin a ref and pass inputs:
#
#     jobs:
#       quality:
#         uses: LucasSantana-Dev/.github/.github/workflows/quality.yml@main
#         with:
#           node-version: "22"
#           has-dockerfile: true
#           run-deadcode: true
#           package-manager: npm
#         permissions:
#           contents: read
#           security-events: write
#           actions: read
#
# Free-tier tools only. See docs/ci-tools-standard.md for the policy.
# GH App installs that the policy approves: SonarCloud, GitGuardian, Socket,
# Dependabot. PR-Agent (Codium-ai action, Anthropic-backed) handles AI review.
# Snyk + Greptile + CodeRabbit are NOT recommended (plan-limited; see ADR).
name: quality

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node major version for lint + deadcode jobs."
        required: false
        type: string
        default: "22"
      has-dockerfile:
        description: "Run hadolint against Dockerfile* in repo root + deploy/."
        required: false
        type: boolean
        default: false
      run-deadcode:
        description: "Run knip (TS dead-code detection). Repo must declare it in devDependencies."
        required: false
        type: boolean
        default: false
      run-osv-scanner:
        description: "Run google/osv-scanner-action for transitive CVE alerts against lockfiles. Fail-soft — emits findings to the Security tab via SARIF without blocking merge. Per-repo: promote to a required check after 1 week of clean signal. Replaces Snyk's dep-CVE scanning role per docs/ci-tools-standard.md."
        required: false
        type: boolean
        default: true
      package-manager:
        description: "npm | pnpm | yarn. Used by lint + deadcode jobs."
        required: false
        type: string
        default: "npm"
      lint-script:
        description: "Repo npm script for lint. Empty string skips."
        required: false
        type: string
        default: "lint"
      paths-ignore:
        description: "Semgrep / trivy paths to skip (newline-separated)."
        required: false
        type: string
        default: |
          .worktrees/**
          worktrees/**
          .wt-specs/**
          archive/**
          node_modules/**

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=p/default --config=p/security-audit --config=p/owasp-top-ten --sarif --output=semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  trivy:
    name: Vuln + IaC (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  osv-scanner:
    name: Dep CVE (osv-scanner)
    if: ${{ inputs.run-osv-scanner }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@764c91816374ff2d8fc2095dab36eecd42d61638  # v1.9.2
        with:
          # Scan lockfiles + sboms in the repo. Fail-soft: emit findings to
          # Security tab via SARIF, don't block merge on noise. Promote to
          # blocking per-repo after 1 week of clean signal (see ADR).
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv.sarif
            ./
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint
      - name: Lint workflows
        run: actionlint -color -ignore 'SC2016:'

  hadolint:
    name: Dockerfile lint (hadolint)
    if: ${{ inputs.has-dockerfile }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hadolint
        run: |
          curl -sL "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint \
            && chmod +x /usr/local/bin/hadolint
      - name: Lint Dockerfiles
        run: |
          find . -maxdepth 4 \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) \
            -not -path './node_modules/*' -not -path './.worktrees/*' -not -path './worktrees/*' \
            -not -path './.wt-specs/*' -not -path './archive/*' \
            | xargs -I{} hadolint \
                --ignore DL3002 \
                --ignore DL3008 \
                --ignore DL3009 \
                --ignore DL3015 \
                --ignore DL3018 \
                --ignore DL3059 \
                {}

  lint:
    name: Lint (${{ inputs.lint-script }})
    if: ${{ inputs.lint-script != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile (npm cache only works when one exists)
        id: lockfile
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ] || [ -f pnpm-lock.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.lockfile.outputs.present == 'true' && inputs.package-manager || '' }}
      - name: Install dependencies
        # Authenticate postinstall scripts that hit the GitHub REST API
        # (e.g. youtube-dl-exec fetches the yt-dlp binary release manifest)
        # so shared-runner IPs don't hit the 60 req/hr unauthenticated cap.
        # YOUTUBE_DL_SKIP_DOWNLOAD short-circuits the fetch entirely since
        # lint + deadcode don't need the binary.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_DL_SKIP_DOWNLOAD: 'true'
        run: |
          if [ -f package.json ]; then
            ${{ inputs.package-manager }} install --no-audit --no-fund || ${{ inputs.package-manager }} ci --legacy-peer-deps --no-audit --no-fund
          else
            echo "No package.json — skipping install."
          fi
      - run: ${{ inputs.package-manager }} run ${{ inputs.lint-script }}

  deadcode:
    name: Dead code (knip)
    if: ${{ inputs.run-deadcode }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile (npm cache only works when one exists)
        id: lockfile
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ] || [ -f pnpm-lock.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.lockfile.outputs.present == 'true' && inputs.package-manager || '' }}
      - name: Install dependencies
        # Authenticate postinstall scripts that hit the GitHub REST API
        # (e.g. youtube-dl-exec fetches the yt-dlp binary release manifest)
        # so shared-runner IPs don't hit the 60 req/hr unauthenticated cap.
        # YOUTUBE_DL_SKIP_DOWNLOAD short-circuits the fetch entirely since
        # lint + deadcode don't need the binary.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_DL_SKIP_DOWNLOAD: 'true'
        run: |
          if [ -f package.json ]; then
            ${{ inputs.package-manager }} install --no-audit --no-fund || ${{ inputs.package-manager }} ci --legacy-peer-deps --no-audit --no-fund
          else
            echo "No package.json — skipping install."
          fi
      - run: npx --yes knip --reporter=compact --no-exit-code
