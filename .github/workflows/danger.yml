name: Danger (reusable)

# Reusable workflow that runs Danger.js against the consumer repo's
# `dangerfile.ts`. Consumer repos call this via:
#   jobs:
#     danger:
#       uses: LucasSantana-Dev/.github/.github/workflows/danger.yml@v1
#       secrets: inherit
#
# The dangerfile.ts MUST live at the consumer repo root. This workflow
# only provides the runtime — rules are repo-specific by design (see
# ADR 2026-05-10-multi-repo-review-tools-rollout).

on:
  workflow_call:
    inputs:
      # TODO(2026-07-01): pin node to 20 until danger@14+ guarantees Node 24 stability.
      # Upgraded danger@^13 for WHATWG fetch (undici) support (danger@12 used node-fetch v2,
      # which fails on Node 24). Remove node pin after danger v14 stable in wild (≥2 weeks).
      node_version:
        description: 'Node version for Danger runtime.'
        type: string
        required: false
        default: '20'
      danger_version:
        description: 'Pinned danger-js version. Bumped centrally; consumers re-run CI to pick up.'
        type: string
        required: false
        default: '^13'
      fail_on_errors:
        description: 'Pass --failOnErrors to danger ci. Default true.'
        type: boolean
        required: false
        default: true
      timeout_minutes:
        type: number
        required: false
        default: 5

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  danger:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Detect node version
        id: node
        run: |
          if [ -f .nvmrc ]; then
            echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.node_version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: 'npm'

      - name: Install Danger
        run: npm install --no-save danger@${{ inputs.danger_version }}

      - name: Run Danger
        run: |
          if [ "${{ inputs.fail_on_errors }}" = "true" ]; then
            npx danger ci --failOnErrors
          else
            npx danger ci
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
